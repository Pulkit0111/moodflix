services:
  - type: web
    name: moodflix-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CHROMA_DATABASE
        value: moodflix
